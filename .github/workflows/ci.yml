name: CI

on:
    push:
        branches:
            - main
        paths:
            - 'test/**'
    pull_request:
        branches:
            - main
        paths:
            - 'test/**'

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Check out repository
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.11'
                  cache: pip

            - name: Install dependencies
              run: pip install -r requirements.txt

            - name: Run tests
              run: pytest
